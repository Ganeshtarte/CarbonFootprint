<!DOCTYPE html>
<html>

<head>

    <title>Sustainability Prediction</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>Sustainability Prediction Model</h1>

    <form action="/predict" method="POST">

        <label>SP (%)</label>
        <input type="number"
               step="0.01"
               name="sp"
               required>

        <label>Strength (MPa)</label>
        <input type="number"
               step="0.01"
               name="strength"
               required>

        <label>CO₂ (kg/m³)</label>
        <input type="number"
               step="0.01"
               name="co2"
               required>

        <label>Durability</label>
        <input type="number"
               step="0.01"
               name="durability"
               required>

        <button type="submit">
            Predict Sustainability
        </button>

    </form>

    {% if prediction_text %}

        <div class="result">

            <h2>{{ prediction_text }}</h2>

            <h3>Category: {{ category }}</h3>

        </div>

    {% endif %}

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
